<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HUC-12 Watershed Map</title>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", "Helvetica Neue", sans-serif;
      background: #1a1a1a;
      color: #e8e4df;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    header {
      background: #111;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: #e8e4df; }
    header .sub { font-size: 12px; color: #888; margin-left: auto; }
    #state-badge {
      background: #2a4a6a; color: #8BBFDF;
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 3px; letter-spacing: 0.08em;
    }
    #state-switcher { display: flex; gap: 4px; margin-left: 8px; }
    .state-pill {
      font-size: 11px; font-weight: 600; padding: 2px 9px;
      border-radius: 3px; border: 1px solid #333;
      color: #666; text-decoration: none; letter-spacing: 0.06em;
      transition: all 0.15s;
    }
    .state-pill:hover { color: #ccc; border-color: #555; }
    .state-pill.active { background: #2a4a6a; color: #8BBFDF; border-color: #3a6a9a; }

    /* ---- Map ---- */
    #map { flex: 1; position: relative; }

    /* ---- Legend ---- */
    #legend {
      position: absolute; bottom: 32px; left: 12px;
      background: rgba(20,20,20,0.92); border: 1px solid #333;
      border-radius: 6px; padding: 10px 12px; font-size: 11px;
      max-width: 220px; z-index: 5; backdrop-filter: blur(4px);
    }
    #legend h3 {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #aaa; margin-bottom: 8px;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; color: #ccc; }
    .legend-swatch {
      width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .legend-line { width: 22px; height: 2px; flex-shrink: 0; }


    /* ---- Popup ---- */
    .maplibregl-popup-content {
      background: #1a1a1a; color: #e8e4df;
      border: 1px solid #333; border-radius: 6px;
      padding: 10px 13px; font-size: 12px; max-width: 240px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .maplibregl-popup-tip { border-top-color: #1a1a1a !important; }
    .maplibregl-popup-close-button {
      color: #666; font-size: 18px; line-height: 1;
      padding: 4px 8px; background: transparent; border: none;
    }
    .maplibregl-popup-close-button:hover { color: #e8e4df; background: transparent; }

    .popup-title {
      font-weight: 700; font-size: 13px; margin-bottom: 6px;
      color: #e8e4df; padding-right: 16px;
    }
    .popup-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 3px; }
    .popup-label { color: #888; }
    .popup-value { color: #c8dff0; font-weight: 500; }
    .popup-divider { height: 1px; background: #2a2a2a; margin: 8px 0 7px; }
    .popup-dl-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .popup-dl-label { color: #666; font-size: 10px; }
    .popup-dl-link {
      color: #8BBFDF; font-size: 10px; text-decoration: none;
      padding: 2px 7px; border: 1px solid #2a4a6a; border-radius: 3px;
      cursor: pointer; transition: all 0.15s;
    }
    .popup-dl-link:hover { background: #2a4a6a; color: #c8dff0; }

    /* ---- Controls ---- */
    #controls {
      position: absolute; top: 12px; right: 12px;
      display: flex; flex-direction: column; gap: 6px;
      z-index: 5; max-height: calc(100vh - 100px); overflow-y: auto;
    }
    .ctrl-btn {
      background: rgba(20,20,20,0.92); border: 1px solid #333;
      border-radius: 5px; color: #ccc; font-size: 11px;
      padding: 6px 10px; cursor: pointer; backdrop-filter: blur(4px);
      transition: background 0.15s; white-space: nowrap; text-align: left;
    }
    .ctrl-btn:hover { background: rgba(40,40,40,0.95); color: #fff; }
    .ctrl-btn.active { background: #2a4a6a; color: #8BBFDF; border-color: #3a6a9a; }

    /* ---- Download section ---- */
    .ctrl-divider { height: 1px; background: #2a2a2a; margin: 2px 0; }
    #download-section { display: none; flex-direction: column; gap: 4px; }
    #download-section.open { display: flex; }
    .dl-static-list { display: flex; flex-direction: column; gap: 4px; }
    .dl-static {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(20,20,20,0.92); border: 1px solid #2a2a2a;
      border-radius: 4px; color: #8BBFDF; font-size: 10px;
      padding: 6px 10px; text-decoration: none; transition: all 0.15s;
    }
    .dl-static:hover { background: rgba(40,40,40,0.95); color: #c8dff0; border-color: #3a6a9a; }
    .dl-static.unavailable { opacity: 0.35; pointer-events: none; }
    .dl-size { color: #555; font-size: 9px; margin-left: 8px; }

    /* ---- Attribution ---- */
    #data-note { position: absolute; bottom: 8px; right: 8px; font-size: 10px; color: #555; z-index: 5; }
  </style>
</head>
<body>

<header>
  <h1>HUC-12 Watershed Basin Map</h1>
  <span id="state-badge">—</span>
  <nav id="state-switcher">
    <a class="state-pill" href="?state=nm" data-state="nm">NM</a>
    <a class="state-pill" href="?state=co" data-state="co">CO</a>
  </nav>
  <span class="sub">USGS Watershed Boundary Dataset · <span id="feature-count">—</span> subwatersheds</span>
</header>

<div id="map">
  <div id="legend">
    <h3>HUC-4 Subregion</h3>
    <p id="legend-desc" style="font-size:10px;color:#666;margin-bottom:7px;line-height:1.4;">
      Each polygon is one HUC-12 subwatershed,<br>colored by its HUC-4 subregion.
    </p>
    <div id="legend-items"></div>
    <div class="legend-item" style="margin-top:10px; padding-top:8px; border-top:1px solid #2a2a2a;">
      <div class="legend-line" style="background:#cccccc; height:2px;"></div>
      <span>HUC-8 basin boundary</span>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn active" id="btn-fill" onclick="toggleLayer('fill')">&#9679; Fill</button>
    <button class="ctrl-btn active" id="btn-huc8" onclick="toggleLayer('huc8')">&#9679; HUC-8 outlines</button>
    <div class="ctrl-divider"></div>
    <button class="ctrl-btn" id="btn-download" onclick="toggleDownloadSection()">&#8595; Download</button>
    <div id="download-section">
      <div class="dl-static-list">
        <a class="dl-static" id="dl-geojson" href="#" download>
          GeoJSON <span class="dl-size" id="sz-geojson"></span>
        </a>
        <a class="dl-static" id="dl-gpkg" href="#" download>
          GeoPackage <span class="dl-size" id="sz-gpkg"></span>
        </a>
        <a class="dl-static" id="dl-csv" href="#" download>
          CSV (attributes) <span class="dl-size" id="sz-csv"></span>
        </a>
      </div>
    </div>
  </div>

  <div id="data-note">Source: USGS National Map WBD &nbsp;·&nbsp; Small Batch Maps</div>
</div>

<script>
// ---------------------------------------------------------------------------
// State routing — driven by ?state=nm or ?state=co URL param
// ---------------------------------------------------------------------------
const STATES = { nm: "New Mexico", co: "Colorado" };
const urlState  = new URLSearchParams(window.location.search).get("state")?.toLowerCase();
const stateSlug = (urlState && STATES[urlState]) ? urlState : "nm";

// Mark active state pill
document.querySelectorAll(".state-pill").forEach(a => {
  if (a.dataset.state === stateSlug) a.classList.add("active");
});

const CONFIG = {
  pmtilesPath:     `data/processed/huc12_${stateSlug}.pmtiles`,
  huc8PmtilesPath: `data/processed/huc8_${stateSlug}.pmtiles`,
  metaPath:        `data/processed/huc12_${stateSlug}_meta.json`,

  // GitHub Releases hosts the heavy download artifacts (GeoJSON, GPKG, CSV).
  // For fully local dev, change to "data/processed/"
  downloadBaseUrl: "https://github.com/rgdonohue/huc12-pipeline/releases/download/v0.1.0/",
};

// Per-state map defaults — center, initial zoom, min zoom, and pan/zoom bounds
const STATE_MAP = {
  nm: { center: [-106.1, 34.5], zoom: 6.0, minZoom: 5.0, maxBounds: [[-112, 28], [-100, 40]] },
  co: { center: [-105.5, 39.0], zoom: 6.5, minZoom: 5.0, maxBounds: [[-112, 34], [ -99, 44]] },
};
const SM = STATE_MAP[stateSlug] || STATE_MAP.nm;

// 20-color qualitative palette — enough for states with many HUC-4 subregions
const PALETTE = [
  "#4E79A7","#F28E2B","#E15759","#76B7B2","#59A14F",
  "#EDC948","#B07AA1","#FF9DA7","#9C755F","#BAB0AC",
  "#D3A5C0","#86BCB6",
  "#1F77B4","#AECDE6","#2CA02C","#D62728",
  "#9467BD","#8C564B","#E377C2","#7F7F7F",
];

// ---------------------------------------------------------------------------
// Register PMTiles protocol
// ---------------------------------------------------------------------------
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile.bind(protocol));

// ---------------------------------------------------------------------------
// Map init
// ---------------------------------------------------------------------------
const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    glyphs: "https://fonts.openmaptiles.org/{fontstack}/{range}.pbf",
    sources: {
      carto: {
        type: "raster",
        tiles: [
          "https://a.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}@2x.png",
          "https://b.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}@2x.png",
        ],
        tileSize: 256,
        attribution: "© OpenStreetMap contributors, © CARTO",
      },
    },
    layers: [
      { id: "basemap", type: "raster", source: "carto", minzoom: 0, maxzoom: 19 },
    ],
  },
  center: SM.center,
  zoom: SM.zoom,
  minZoom: SM.minZoom,
  maxBounds: SM.maxBounds,
  attributionControl: false,
});

map.addControl(new maplibregl.NavigationControl(), "top-left");
map.addControl(new maplibregl.AttributionControl({ compact: true }), "bottom-right");

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let huc4ColorMap  = {};
let activeToggles = { fill: true, huc8: true };
let popup         = null;

// ---------------------------------------------------------------------------
// Load metadata + build map
// ---------------------------------------------------------------------------
map.on("load", async () => {
  // Load lightweight meta JSON — gives us HUC-4 codes, counts, and bounds info
  let meta;
  try {
    const r = await fetch(CONFIG.metaPath);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    meta = await r.json();
  } catch (err) {
    showError(`Could not load map metadata: ${err.message}<br>
      Make sure <code>${CONFIG.metaPath}</code> exists.<br>
      Run: <code>python scripts/fetch_huc12.py --state ${stateSlug.toUpperCase()}</code>`);
    return;
  }

  // Build HUC-4 color map from metadata
  meta.huc4_codes.forEach((code, i) => {
    huc4ColorMap[code] = PALETTE[i % PALETTE.length];
  });

  // Update header
  document.getElementById("state-badge").textContent  = meta.state;
  document.getElementById("feature-count").textContent = meta.huc12_count.toLocaleString();

  // Add PMTiles vector sources
  // promoteId uses the huc12 attribute as a stable feature ID (required for setFeatureState)
  map.addSource("huc12", {
    type: "vector",
    url: `pmtiles://${CONFIG.pmtilesPath}`,
    promoteId: { huc12: "huc12" },
  });

  map.addSource("huc8", {
    type: "vector",
    url: `pmtiles://${CONFIG.huc8PmtilesPath}`,
  });

  // Match expression: fill by HUC-4 attribute in the vector tile
  const matchExpr = ["match", ["slice", ["get", "huc4"], 0, 4]];
  meta.huc4_codes.forEach(code => matchExpr.push(code, huc4ColorMap[code]));
  matchExpr.push("#888888"); // fallback

  // HUC-12 fill
  map.addLayer({
    id: "huc12-fill",
    type: "fill",
    source: "huc12",
    "source-layer": "huc12",
    paint: {
      "fill-color": matchExpr,
      "fill-opacity": ["case", ["boolean", ["feature-state", "hover"], false], 0.80, 0.55],
    },
  });

  // HUC-12 fine boundary
  map.addLayer({
    id: "huc12-line",
    type: "line",
    source: "huc12",
    "source-layer": "huc12",
    paint: {
      "line-color": "#ffffff",
      "line-width": ["interpolate", ["linear"], ["zoom"], 5, 0.2, 9, 0.7],
      "line-opacity": 0.4,
    },
  });

  // HUC-8 dissolved boundary overlay
  map.addLayer({
    id: "huc8-line",
    type: "line",
    source: "huc8",
    "source-layer": "huc8",
    paint: {
      "line-color": "#cccccc",
      "line-width": ["interpolate", ["linear"], ["zoom"], 5, 1.2, 9, 2.0],
      "line-opacity": 0.7,
    },
  });

  buildLegend(meta.huc4_codes);
  setupDownloadLinks(meta);
  setupInteractions();

  // Fit to data extent via PMTiles metadata
  try {
    const pt = await protocol.get(new pmtiles.PMTiles(CONFIG.pmtilesPath));
    const h = pt.getHeader ? await pt.getHeader() : null;
    if (h && h.minLon != null) {
      map.fitBounds([[h.minLon, h.minLat], [h.maxLon, h.maxLat]], { padding: 40, duration: 0 });
    }
  } catch (_) {
    // fitBounds fails gracefully — map stays at default center/zoom
  }
});

// ---------------------------------------------------------------------------
// Legend
// ---------------------------------------------------------------------------
function buildLegend(huc4Codes) {
  const container = document.getElementById("legend-items");
  huc4Codes.forEach(code => {
    const div = document.createElement("div");
    div.className = "legend-item";
    div.innerHTML = `
      <div class="legend-swatch" style="background:${huc4ColorMap[code]};"></div>
      <span>HUC-4 ${code}</span>`;
    container.appendChild(div);
  });
}

// ---------------------------------------------------------------------------
// Download panel
// ---------------------------------------------------------------------------
function setupDownloadLinks(meta) {
  const slug = meta.state.toLowerCase();
  const base = CONFIG.downloadBaseUrl;

  const links = [
    { id: "dl-geojson", file: `huc12_${slug}.geojson`, szId: "sz-geojson" },
    { id: "dl-gpkg",    file: `huc12_${slug}.gpkg`,    szId: "sz-gpkg"    },
    { id: "dl-csv",     file: `huc12_${slug}_summary.csv`, szId: "sz-csv" },
  ];

  links.forEach(({ id, file, szId }) => {
    const el = document.getElementById(id);
    el.href = `${base}${file}`;
    el.setAttribute("download", file);
    fetchSize(`${base}${file}`, szId, id);
  });
}

async function fetchSize(url, labelId, linkId) {
  try {
    const r = await fetch(url, { method: "HEAD" });
    if (!r.ok) { document.getElementById(linkId)?.classList.add("unavailable"); return; }
    const bytes = parseInt(r.headers.get("content-length") || "0");
    if (!bytes) return;
    const label = bytes > 1_048_576
      ? `${(bytes / 1_048_576).toFixed(0)} MB`
      : `${(bytes / 1024).toFixed(0)} KB`;
    const el = document.getElementById(labelId);
    if (el) el.textContent = label;
  } catch (_) {
    document.getElementById(linkId)?.classList.add("unavailable");
  }
}

function toggleDownloadSection() {
  const section = document.getElementById("download-section");
  const btn     = document.getElementById("btn-download");
  const open    = section.classList.toggle("open");
  btn.classList.toggle("active", open);
}

// ---------------------------------------------------------------------------
// Interactions: hover + click popup
// ---------------------------------------------------------------------------
function setupInteractions() {
  let hoveredId = null;

  map.on("mousemove", "huc12-fill", (e) => {
    map.getCanvas().style.cursor = "pointer";
    if (hoveredId !== null) {
      map.setFeatureState(
        { source: "huc12", sourceLayer: "huc12", id: hoveredId },
        { hover: false }
      );
    }
    hoveredId = e.features[0].id;
    map.setFeatureState(
      { source: "huc12", sourceLayer: "huc12", id: hoveredId },
      { hover: true }
    );
  });

  map.on("mouseleave", "huc12-fill", () => {
    map.getCanvas().style.cursor = "";
    if (hoveredId !== null) {
      map.setFeatureState(
        { source: "huc12", sourceLayer: "huc12", id: hoveredId },
        { hover: false }
      );
      hoveredId = null;
    }
  });

  // Click: open popup
  map.on("click", "huc12-fill", (e) => {
    const p      = e.features[0].properties;
    const huc12  = p.huc12  || "—";
    const name   = p.name   || "—";
    const huc4   = p.huc4   || (huc12 !== "—" ? huc12.slice(0, 4) : "—");
    const area   = p.area_sqmi != null ? `${Number(p.area_sqmi).toFixed(1)} sq mi` : "—";
    const states = p.states || "—";

    if (popup) popup.remove();
    popup = new maplibregl.Popup({ closeButton: true, closeOnClick: true })
      .setLngLat(e.lngLat)
      .setHTML(`
        <div class="popup-title">${name}</div>
        <div class="popup-row">
          <span class="popup-label">HUC-12</span>
          <span class="popup-value">${huc12}</span>
        </div>
        <div class="popup-row">
          <span class="popup-label">HUC-4 subregion</span>
          <span class="popup-value">${huc4}</span>
        </div>
        <div class="popup-row">
          <span class="popup-label">Area</span>
          <span class="popup-value">${area}</span>
        </div>
        <div class="popup-row">
          <span class="popup-label">States</span>
          <span class="popup-value">${states}</span>
        </div>
        <div class="popup-divider"></div>
        <div class="popup-dl-row">
          <span class="popup-dl-label">Full dataset:</span>
          <a class="popup-dl-link" id="popup-dl-link" href="#"
            onclick="document.getElementById('btn-download').click();return false;">
            &#8595; Download panel
          </a>
        </div>
      `)
      .addTo(map);
  });

  // Click on empty area: close popup
  map.on("click", (e) => {
    const features = map.queryRenderedFeatures(e.point, { layers: ["huc12-fill"] });
    if (!features.length && popup) { popup.remove(); popup = null; }
  });
}

// ---------------------------------------------------------------------------
// Layer toggles
// ---------------------------------------------------------------------------
const layerGroups = {
  fill: ["huc12-fill", "huc12-line"],
  huc8: ["huc8-line"],
};

function toggleLayer(group) {
  activeToggles[group] = !activeToggles[group];
  const visible = activeToggles[group] ? "visible" : "none";
  document.getElementById(`btn-${group}`)?.classList.toggle("active", activeToggles[group]);
  layerGroups[group]?.forEach(id => {
    if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", visible);
  });
}

// ---------------------------------------------------------------------------
// Error display
// ---------------------------------------------------------------------------
function showError(html) {
  const div = document.createElement("div");
  div.style.cssText = `
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:#1a1a1a; border:1px solid #555; border-radius:8px;
    padding:24px 28px; max-width:420px; text-align:center;
    font-size:13px; line-height:1.6; color:#e8e4df; z-index:100;
  `;
  div.innerHTML = `<strong style="color:#E15759;">&#9888; Error</strong><br><br>${html}`;
  document.getElementById("map").appendChild(div);
}
</script>
</body>
</html>
