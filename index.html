<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HUC-12 Watershed Map</title>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", "Helvetica Neue", sans-serif;
      background: #1a1a1a;
      color: #e8e4df;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    header {
      background: #111;
      padding: 9px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; color: #e8e4df; }
    .header-divider { width: 1px; height: 18px; background: #2a2a2a; flex-shrink: 0; }
    .header-state-label { font-size: 10px; color: #555; letter-spacing: 0.06em; text-transform: uppercase; }
    header .sub { font-size: 11px; color: #555; margin-left: auto; white-space: nowrap; }

    #state-switcher { display: flex; align-items: center; gap: 6px; }
    .state-pill {
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 3px; border: 1px solid #333;
      color: #666; text-decoration: none; letter-spacing: 0.06em;
      transition: all 0.15s;
    }
    .state-pill:hover { color: #ccc; border-color: #555; }
    .state-pill.active { background: #2a4a6a; color: #8BBFDF; border-color: #3a6a9a; }

    /* ---- Map ---- */
    #map { flex: 1; position: relative; }

    /* ---- Legend ---- */
    #legend {
      position: absolute; bottom: 32px; left: 12px;
      background: rgba(15,15,15,0.94); border: 1px solid #2a2a2a;
      border-radius: 7px; padding: 12px 13px; font-size: 11px;
      width: 210px; z-index: 5; backdrop-filter: blur(6px);
      max-height: calc(100vh - 120px);
      overflow-y: auto;
    }
    #legend::-webkit-scrollbar { width: 4px; }
    #legend::-webkit-scrollbar-track { background: transparent; }
    #legend::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    #legend h3 {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: #666; margin-bottom: 9px;
    }

    /* Hierarchy guide */
    .legend-hierarchy {
      margin-bottom: 11px; padding-bottom: 10px;
      border-bottom: 1px solid #222;
    }
    .legend-h-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 5px; color: #aaa; font-size: 10px;
    }
    .legend-h-row:last-child { margin-bottom: 0; }
    .h-poly { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0;
      background: #3a5a3a; border: 1px solid rgba(255,255,255,0.1); }
    .h-line { width: 20px; height: 2px; flex-shrink: 0; background: #aaa; }
    .h-palette {
      width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0;
      background: linear-gradient(135deg, #4E79A7 33%, #F28E2B 33% 66%, #59A14F 66%);
    }
    .legend-h-label { line-height: 1.3; }
    .legend-h-label strong { color: #ddd; font-weight: 600; display: block; font-size: 10px; }
    .legend-h-label span { color: #555; font-size: 9px; }

    /* HUC-2 group headers in legend */
    .legend-group {
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #555;
      margin: 10px 0 5px;
      padding-top: 8px; border-top: 1px solid #1e1e1e;
    }
    .legend-group:first-of-type { margin-top: 0; border-top: none; padding-top: 0; }

    .legend-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
    .legend-swatch {
      width: 13px; height: 13px; border-radius: 2px; flex-shrink: 0; margin-top: 1px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .legend-name { color: #ccc; font-size: 11px; line-height: 1.3; }
    .legend-code { color: #444; font-size: 9px; display: block; }
    .legend-line { width: 22px; height: 2px; flex-shrink: 0; margin-top: 5px; }
    .legend-huc8-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 12px; padding-top: 10px; border-top: 1px solid #222;
      color: #777; font-size: 10px;
    }

    /* ---- Hint toast ---- */
    #hint-toast {
      position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
      background: rgba(15,15,15,0.9); border: 1px solid #3a3a3a;
      border-radius: 20px; padding: 7px 18px;
      font-size: 11px; color: #888; z-index: 20;
      white-space: nowrap; pointer-events: none;
      transition: opacity 0.7s;
    }
    #hint-toast.fade-out { opacity: 0; }

    /* ---- Popup ---- */
    .maplibregl-popup-content {
      background: #141414; color: #e8e4df;
      border: 1px solid #2a2a2a; border-radius: 7px;
      padding: 11px 14px; font-size: 12px; max-width: 250px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    }
    .maplibregl-popup-tip { border-top-color: #141414 !important; }
    .maplibregl-popup-close-button {
      color: #555; font-size: 18px; line-height: 1;
      padding: 4px 8px; background: transparent; border: none;
    }
    .maplibregl-popup-close-button:hover { color: #e8e4df; background: transparent; }

    .popup-title { font-weight: 700; font-size: 13px; margin-bottom: 8px; color: #e8e4df; padding-right: 18px; }
    .popup-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
    .popup-label { color: #666; font-size: 11px; }
    .popup-value { color: #c8dff0; font-weight: 500; font-size: 11px; text-align: right; }
    .popup-divider { height: 1px; background: #222; margin: 8px 0 7px; }
    .popup-dl-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .popup-dl-label { color: #555; font-size: 10px; }
    .popup-dl-link {
      color: #8BBFDF; font-size: 10px; text-decoration: none;
      padding: 2px 7px; border: 1px solid #2a4a6a; border-radius: 3px;
      cursor: pointer; transition: all 0.15s;
    }
    .popup-dl-link:hover { background: #2a4a6a; color: #c8dff0; }

    /* ---- Controls ---- */
    #controls {
      position: absolute; top: 12px; right: 12px;
      display: flex; flex-direction: column; gap: 5px;
      z-index: 5; min-width: 160px;
    }

    /* Toggle buttons: view state (on/off) */
    .ctrl-toggle {
      background: rgba(18,18,18,0.92); border: 1px solid #2a2a2a;
      border-left: 3px solid transparent;
      border-radius: 5px; color: #555; font-size: 11px;
      padding: 6px 10px 6px 9px; cursor: pointer; backdrop-filter: blur(4px);
      transition: all 0.15s; white-space: nowrap; text-align: left;
      display: flex; align-items: center; gap: 7px;
    }
    .ctrl-toggle:hover { color: #aaa; border-left-color: #444; }
    .ctrl-toggle.active { border-left-color: #4E79A7; color: #c8dff0; }
    .ctrl-toggle .dot { font-size: 8px; flex-shrink: 0; color: #333; transition: color 0.15s; }
    .ctrl-toggle.active .dot { color: #8BBFDF; }

    .ctrl-divider { height: 1px; background: #1e1e1e; margin: 2px 0; }

    /* Action button: triggers a disclosure/modal (Download) */
    .ctrl-action {
      background: rgba(30,50,70,0.85); border: 1px solid #2a4a6a;
      border-radius: 5px; color: #7AABCF; font-size: 11px;
      padding: 7px 12px; cursor: pointer; backdrop-filter: blur(4px);
      transition: all 0.15s; white-space: nowrap; text-align: center;
    }
    .ctrl-action:hover { background: rgba(42,74,106,0.95); color: #c8dff0; }
    .ctrl-action.active { background: #2a4a6a; color: #8BBFDF; }

    /* ---- Download section ---- */
    #download-section { display: none; flex-direction: column; gap: 4px; }
    #download-section.open { display: flex; }
    .dl-static {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(15,15,15,0.92); border: 1px solid #1e1e1e;
      border-radius: 4px; color: #7AABCF; font-size: 10px;
      padding: 6px 10px; text-decoration: none; transition: all 0.15s;
    }
    .dl-static:hover { background: rgba(30,50,70,0.9); color: #c8dff0; border-color: #2a4a6a; }
    .dl-size { color: #444; font-size: 9px; margin-left: 6px; }
  </style>
</head>
<body>

<header>
  <h1>HUC-12 Watershed Map</h1>
  <div class="header-divider"></div>
  <nav id="state-switcher">
    <span class="header-state-label">State</span>
    <a class="state-pill" href="?state=nm" data-state="nm">NM</a>
    <a class="state-pill" href="?state=co" data-state="co">CO</a>
  </nav>
  <span class="sub">USGS WBD &nbsp;·&nbsp; <span id="feature-count">—</span> subwatersheds</span>
</header>

<div id="map">
  <div id="legend">
    <h3>Map Guide</h3>
    <div class="legend-hierarchy">
      <div class="legend-h-row">
        <div class="h-poly"></div>
        <div class="legend-h-label">
          <strong>HUC-12</strong>
          <span>each polygon = one subwatershed</span>
        </div>
      </div>
      <div class="legend-h-row">
        <div class="h-line"></div>
        <div class="legend-h-label">
          <strong>HUC-8</strong>
          <span>thick line = basin boundary</span>
        </div>
      </div>
      <div class="legend-h-row">
        <div class="h-palette"></div>
        <div class="legend-h-label">
          <strong>HUC-4</strong>
          <span>color = subregion family</span>
        </div>
      </div>
    </div>
    <div id="legend-items"></div>
    <div class="legend-huc8-row">
      <div class="legend-line" style="background:#aaa; margin-top:0;"></div>
      <span>HUC-8 basin boundary</span>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-toggle active" id="btn-fill" onclick="toggleLayer('fill')">
      <span class="dot">●</span>Fill
    </button>
    <button class="ctrl-toggle active" id="btn-huc8" onclick="toggleLayer('huc8')">
      <span class="dot">●</span>HUC-8 outlines
    </button>
    <div class="ctrl-divider"></div>
    <button class="ctrl-action" id="btn-download" onclick="toggleDownloadSection()">↓ Download data</button>
    <div id="download-section">
      <a class="dl-static" id="dl-geojson" href="#">
        GeoJSON <span class="dl-size" id="sz-geojson"></span>
      </a>
      <a class="dl-static" id="dl-gpkg" href="#">
        GeoPackage <span class="dl-size" id="sz-gpkg"></span>
      </a>
      <a class="dl-static" id="dl-csv" href="#">
        CSV (attributes) <span class="dl-size" id="sz-csv"></span>
      </a>
    </div>
  </div>

  <div id="hint-toast">Click any subwatershed to explore it</div>
</div>

<script>
// ---------------------------------------------------------------------------
// State routing — driven by ?state=nm or ?state=co URL param
// ---------------------------------------------------------------------------
const STATES = { nm: "New Mexico", co: "Colorado" };
const urlState  = new URLSearchParams(window.location.search).get("state")?.toLowerCase();
const stateSlug = (urlState && STATES[urlState]) ? urlState : "nm";

document.querySelectorAll(".state-pill").forEach(a => {
  if (a.dataset.state === stateSlug) a.classList.add("active");
});

const CONFIG = {
  pmtilesPath:     `data/processed/huc12_${stateSlug}.pmtiles`,
  huc8PmtilesPath: `data/processed/huc8_${stateSlug}.pmtiles`,
  metaPath:        `data/processed/huc12_${stateSlug}_meta.json`,
  downloadBaseUrl: "https://github.com/rgdonohue/huc12-pipeline/releases/download/v0.1.0/",
};

const STATE_MAP = {
  nm: { center: [-106.1, 34.5], zoom: 6.0, minZoom: 5.0, maxBounds: [[-112, 28], [-100, 40]] },
  co: { center: [-105.5, 39.0], zoom: 6.5, minZoom: 5.0, maxBounds: [[-112, 34], [ -99, 44]] },
};
const SM = STATE_MAP[stateSlug] || STATE_MAP.nm;

// ---------------------------------------------------------------------------
// HUC name lookup tables
// ---------------------------------------------------------------------------
const HUC2_NAMES = {
  "10": "Missouri",
  "11": "Arkansas–White–Red",
  "12": "Texas–Gulf",
  "13": "Rio Grande",
  "14": "Upper Colorado",
  "15": "Lower Colorado",
};

const HUC4_NAMES = {
  // Missouri (10xx) — CO eastern slope
  "1018": "South Platte",
  "1019": "North Platte",
  "1025": "Republican",
  "1026": "Smoky Hill",
  // Arkansas–White–Red (11xx)
  "1102": "Upper Arkansas",
  "1103": "Middle Arkansas",
  "1104": "Canadian",
  "1108": "Cimarron",
  "1109": "Upper Cimarron",
  "1110": "Lower Cimarron",
  "1112": "Lower Arkansas",
  // Texas–Gulf (12xx)
  "1205": "Nueces",
  "1208": "Rio Grande–Pecos",
  // Rio Grande (13xx)
  "1301": "Rio Grande Headwaters",
  "1302": "Middle Rio Grande",
  "1303": "Rio Grande–Elephant Butte",
  "1304": "Closed Basins",
  "1305": "Pecos",
  "1306": "Rio Grande–Amistad",
  "1307": "Lower Rio Grande",
  // Upper Colorado (14xx)
  "1401": "Upper Green",
  "1402": "Lower Green",
  "1403": "Upper Colorado",
  "1404": "Colorado–Escalante",
  "1405": "Gunnison",
  "1406": "Colorado–Lake Powell",
  "1408": "San Juan",
  // Lower Colorado (15xx)
  "1502": "Little Colorado",
  "1504": "Bill Williams",
  "1508": "Lower Gila",
};

// Color families per HUC-2 — avoids cross-basin collisions
const HUC2_PALETTES = {
  "10": ["#4472C4","#70A0D0","#2E5FA3","#9DC3E6","#5B9BD5"],    // blues   — Missouri
  "11": ["#E8801A","#F4C262","#C55A11","#F4B183","#D08030"],    // oranges — Arkansas-White-Red
  "12": ["#C0392B","#E8736A","#922B21","#F1948A"],              // reds    — Texas-Gulf
  "13": ["#7B52A6","#B07AA1","#9467BD","#D3A5C0","#A78EBF","#6B3FA0","#C5A5CF"], // purples — Rio Grande
  "14": ["#3A8A3A","#5DAD5D","#2D6E2D","#74C476","#4F9E4F","#A1D99B","#256125"], // greens  — Upper Colorado
  "15": ["#1A8A8A","#45B8B8","#0E6E6E","#7ECFCF","#5ABABA"],    // teals   — Lower Colorado
};

// ---------------------------------------------------------------------------
// Register PMTiles protocol
// ---------------------------------------------------------------------------
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile.bind(protocol));

// ---------------------------------------------------------------------------
// Map init
// ---------------------------------------------------------------------------
const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    glyphs: "https://fonts.openmaptiles.org/{fontstack}/{range}.pbf",
    sources: {
      carto: {
        type: "raster",
        tiles: [
          "https://a.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}@2x.png",
          "https://b.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}@2x.png",
        ],
        tileSize: 256,
        attribution: "© OpenStreetMap contributors, © CARTO",
      },
    },
    layers: [
      { id: "basemap", type: "raster", source: "carto", minzoom: 0, maxzoom: 19 },
    ],
  },
  center: SM.center,
  zoom: SM.zoom,
  minZoom: SM.minZoom,
  maxBounds: SM.maxBounds,
  attributionControl: false,
});

map.addControl(new maplibregl.NavigationControl(), "top-left");
map.addControl(new maplibregl.AttributionControl({
  compact: true,
  customAttribution: "USGS WBD · Small Batch Maps",
}), "bottom-right");

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let huc4ColorMap  = {};
let activeToggles = { fill: true, huc8: true };
let popup         = null;

// ---------------------------------------------------------------------------
// Load metadata + build map
// ---------------------------------------------------------------------------
map.on("load", async () => {
  let meta;
  try {
    const r = await fetch(CONFIG.metaPath);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    meta = await r.json();
  } catch (err) {
    showError(`Could not load map metadata: ${err.message}<br>
      Make sure <code>${CONFIG.metaPath}</code> exists.<br>
      Run: <code>python scripts/fetch_huc12.py --state ${stateSlug.toUpperCase()}</code>`);
    return;
  }

  // Build HUC-4 color map grouped by HUC-2 family to avoid cross-basin collisions
  const huc2Counters = {};
  meta.huc4_codes.forEach(code => {
    const huc2 = code.slice(0, 2);
    const family = HUC2_PALETTES[huc2] || ["#888888"];
    const idx = huc2Counters[huc2] || 0;
    huc4ColorMap[code] = family[idx % family.length];
    huc2Counters[huc2] = idx + 1;
  });

  document.getElementById("feature-count").textContent = meta.huc12_count.toLocaleString();

  map.addSource("huc12", {
    type: "vector",
    url: `pmtiles://${CONFIG.pmtilesPath}`,
    promoteId: { huc12: "huc12" },
  });

  map.addSource("huc8", {
    type: "vector",
    url: `pmtiles://${CONFIG.huc8PmtilesPath}`,
  });

  const matchExpr = ["match", ["slice", ["get", "huc4"], 0, 4]];
  meta.huc4_codes.forEach(code => matchExpr.push(code, huc4ColorMap[code]));
  matchExpr.push("#666666");

  map.addLayer({
    id: "huc12-fill",
    type: "fill",
    source: "huc12",
    "source-layer": "huc12",
    paint: {
      "fill-color": matchExpr,
      "fill-opacity": ["case", ["boolean", ["feature-state", "hover"], false], 0.82, 0.58],
    },
  });

  map.addLayer({
    id: "huc12-line",
    type: "line",
    source: "huc12",
    "source-layer": "huc12",
    paint: {
      "line-color": "#ffffff",
      "line-width": ["interpolate", ["linear"], ["zoom"], 5, 0.2, 9, 0.7],
      "line-opacity": 0.35,
    },
  });

  map.addLayer({
    id: "huc8-line",
    type: "line",
    source: "huc8",
    "source-layer": "huc8",
    paint: {
      "line-color": "#cccccc",
      "line-width": ["interpolate", ["linear"], ["zoom"], 5, 1.2, 9, 2.2],
      "line-opacity": 0.65,
    },
  });

  buildLegend(meta.huc4_codes);
  setupDownloadLinks(meta);
  setupInteractions();

  // Fit to data extent via PMTiles header metadata
  try {
    const pt = await protocol.get(new pmtiles.PMTiles(CONFIG.pmtilesPath));
    const h = pt.getHeader ? await pt.getHeader() : null;
    if (h && h.minLon != null) {
      map.fitBounds([[h.minLon, h.minLat], [h.maxLon, h.maxLat]], {
        padding: { top: 70, bottom: 70, left: 260, right: 190 },
        duration: 0,
      });
    }
  } catch (_) { /* stays at default center/zoom */ }

  // First-load hint toast — auto-dismisses after 4.5s or on first click
  const hintEl = document.getElementById("hint-toast");
  if (hintEl) {
    const dismiss = () => {
      hintEl.classList.add("fade-out");
      setTimeout(() => hintEl.remove(), 800);
    };
    setTimeout(dismiss, 4500);
    map.once("click", "huc12-fill", dismiss);
  }
});

// ---------------------------------------------------------------------------
// Legend — grouped by HUC-2 basin family
// ---------------------------------------------------------------------------
function buildLegend(huc4Codes) {
  const container = document.getElementById("legend-items");

  // Group codes by HUC-2 prefix
  const groups = {};
  for (const code of huc4Codes) {
    const huc2 = code.slice(0, 2);
    if (!groups[huc2]) groups[huc2] = [];
    groups[huc2].push(code);
  }

  for (const huc2 of Object.keys(groups).sort()) {
    const header = document.createElement("div");
    header.className = "legend-group";
    header.textContent = HUC2_NAMES[huc2] || `HUC-2 ${huc2}`;
    container.appendChild(header);

    for (const code of groups[huc2]) {
      const name = HUC4_NAMES[code];
      const div = document.createElement("div");
      div.className = "legend-item";
      div.innerHTML = `
        <div class="legend-swatch" style="background:${huc4ColorMap[code]};"></div>
        <div class="legend-name">
          ${name || "Subregion"}
          <span class="legend-code">${code}</span>
        </div>`;
      container.appendChild(div);
    }
  }
}

// ---------------------------------------------------------------------------
// Download panel
// ---------------------------------------------------------------------------
function setupDownloadLinks(meta) {
  const slug  = meta.state.toLowerCase();
  const base  = CONFIG.downloadBaseUrl;
  const sizes = meta.download_sizes || {};

  const fmt = bytes => bytes > 1_048_576
    ? `${(bytes / 1_048_576).toFixed(0)} MB`
    : `${(bytes / 1024).toFixed(0)} KB`;

  const links = [
    { id: "dl-geojson", file: `huc12_${slug}.geojson`,    szId: "sz-geojson", key: "geojson" },
    { id: "dl-gpkg",    file: `huc12_${slug}.gpkg`,        szId: "sz-gpkg",    key: "gpkg"    },
    { id: "dl-csv",     file: `huc12_${slug}_summary.csv`, szId: "sz-csv",     key: "csv"     },
  ];

  links.forEach(({ id, file, szId, key }) => {
    const el = document.getElementById(id);
    el.href = `${base}${file}`;
    if (sizes[key]) document.getElementById(szId).textContent = fmt(sizes[key]);
  });
}

function toggleDownloadSection() {
  const section = document.getElementById("download-section");
  const btn     = document.getElementById("btn-download");
  const open    = section.classList.toggle("open");
  btn.classList.toggle("active", open);
}

// ---------------------------------------------------------------------------
// Interactions: hover + click popup
// ---------------------------------------------------------------------------
function setupInteractions() {
  let hoveredId = null;

  map.on("mousemove", "huc12-fill", (e) => {
    map.getCanvas().style.cursor = "pointer";
    if (hoveredId !== null) {
      map.setFeatureState({ source: "huc12", sourceLayer: "huc12", id: hoveredId }, { hover: false });
    }
    hoveredId = e.features[0].id;
    map.setFeatureState({ source: "huc12", sourceLayer: "huc12", id: hoveredId }, { hover: true });
  });

  map.on("mouseleave", "huc12-fill", () => {
    map.getCanvas().style.cursor = "";
    if (hoveredId !== null) {
      map.setFeatureState({ source: "huc12", sourceLayer: "huc12", id: hoveredId }, { hover: false });
      hoveredId = null;
    }
  });

  map.on("click", "huc12-fill", (e) => {
    const p     = e.features[0].properties;
    const huc12 = p.huc12  || "—";
    const name  = p.name   || "—";
    const huc4  = p.huc4   || (huc12 !== "—" ? huc12.slice(0, 4) : "—");
    const huc4Label = HUC4_NAMES[huc4] ? `${HUC4_NAMES[huc4]} (${huc4})` : huc4;
    const area  = p.area_sqmi != null ? `${Number(p.area_sqmi).toFixed(1)} sq mi` : "—";
    const states = p.states || "—";

    if (popup) popup.remove();
    popup = new maplibregl.Popup({ closeButton: true, closeOnClick: true })
      .setLngLat(e.lngLat)
      .setHTML(`
        <div class="popup-title">${name}</div>
        <div class="popup-row">
          <span class="popup-label">HUC-12</span>
          <span class="popup-value">${huc12}</span>
        </div>
        <div class="popup-row">
          <span class="popup-label">HUC-4 subregion</span>
          <span class="popup-value">${huc4Label}</span>
        </div>
        <div class="popup-row">
          <span class="popup-label">Area</span>
          <span class="popup-value">${area}</span>
        </div>
        <div class="popup-row">
          <span class="popup-label">States</span>
          <span class="popup-value">${states}</span>
        </div>
        <div class="popup-divider"></div>
        <div class="popup-dl-row">
          <span class="popup-dl-label">Full state dataset:</span>
          <a class="popup-dl-link" href="#"
            onclick="document.getElementById('btn-download').click();return false;">
            ↓ Download
          </a>
        </div>
      `)
      .addTo(map);
  });

  map.on("click", (e) => {
    const features = map.queryRenderedFeatures(e.point, { layers: ["huc12-fill"] });
    if (!features.length && popup) { popup.remove(); popup = null; }
  });
}

// ---------------------------------------------------------------------------
// Layer toggles
// ---------------------------------------------------------------------------
const layerGroups = {
  fill: ["huc12-fill", "huc12-line"],
  huc8: ["huc8-line"],
};

function toggleLayer(group) {
  activeToggles[group] = !activeToggles[group];
  const visible = activeToggles[group] ? "visible" : "none";
  document.getElementById(`btn-${group}`)?.classList.toggle("active", activeToggles[group]);
  layerGroups[group]?.forEach(id => {
    if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", visible);
  });
}

// ---------------------------------------------------------------------------
// Error display
// ---------------------------------------------------------------------------
function showError(html) {
  const div = document.createElement("div");
  div.style.cssText = `
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:#141414; border:1px solid #555; border-radius:8px;
    padding:24px 28px; max-width:420px; text-align:center;
    font-size:13px; line-height:1.6; color:#e8e4df; z-index:100;
  `;
  div.innerHTML = `<strong style="color:#E15759;">⚠ Error</strong><br><br>${html}`;
  document.getElementById("map").appendChild(div);
}
</script>
